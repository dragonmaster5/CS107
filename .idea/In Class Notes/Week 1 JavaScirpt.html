<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script>
        const score = parseFloat(prompt("What is the score?"));
        if(score>=60)
        {
            document.write(`${score} is a passing score.`)
        }
        else if (score<60)
        {
            document.write(`${score} is a failing score.`)
        }

    </script>
</head>
<body>

</body>
</html>
